name: Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Install dependencies
        run: npm ci

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.jks \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=AI Tester, OU=Mobile, O=AI Tester, L=Unknown, S=Unknown, C=US"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          ANDROID_STORE_PASSWORD: android
          ANDROID_KEY_ALIAS: release
          ANDROID_KEY_PASSWORD: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-tester-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
